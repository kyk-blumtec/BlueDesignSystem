<style>
  /* CSS Fallback */
  #0-docs svg.css-13mxo4m, 
  #1-foundation svg.css-13mxo4m, 
  #2-components svg.css-13mxo4m {
    display: none !important;
  }
  #0-docs, #1-foundation, #2-components {
    padding-left: 10px !important;
  }
</style>

<script>
  console.log('ANTIGRAVITY_SIDEBAR_CLEANER_V7_LOADED');
  function hideSpecificIcons() {
    ['0-docs', '1-foundation', '2-components'].forEach(id => {
      const btn = document.getElementById(id);
      if (btn) {
        // Find the icon that is NOT the first child's SVG (expansion arrow)
        const svgs = Array.from(btn.querySelectorAll('svg'));
        svgs.forEach(svg => {
          // If it's the blue component icon (secondary color or specific class)
          if (svg.classList.contains('css-13mxo4m') || svg.getAttribute('color') === 'secondary') {
            svg.style.display = 'none';
          }
        });
      }
    });
  }
  setInterval(hideSpecificIcons, 100);
</script>
